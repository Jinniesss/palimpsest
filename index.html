<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Palimpsest</title>
<style>
  html, body, #root { margin: 0; padding: 0; width: 100%; height: 100%; }
  * { box-sizing: border-box; }
  body { font-family: 'Iowan Old Style', Georgia, serif; }
  button { cursor: pointer; }
</style>
</head>
<body>
<div id="root"></div>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useMemo } = React;

const COLORS = {
  bg: "#0B0B10", panel: "#15151D", panelBorder: "#26262F",
  text: "#E9E6DF", textMuted: "#8B899A", textFaint: "#55535F",
  support: "#D8A657", contradict: "#B876C9", supersede: "#5B5A64",
};

const STORAGE_KEY = "palimpsest:graph";
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 8);

function tagAnchor(tag, width, height) {
  let hash = 0;
  for (let i = 0; i < tag.length; i++) hash = (hash * 31 + tag.charCodeAt(i)) | 0;
  const angle = (Math.abs(hash) % 360) * (Math.PI / 180);
  const radius = Math.min(width, height) * 0.3;
  return { x: width / 2 + radius * Math.cos(angle), y: height / 2 + radius * Math.sin(angle) };
}
function formatDate(ts) {
  return new Date(ts).toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" });
}

// inline icons (no external icon package on a static page)
const Icon = ({ children, size = 14, color = "currentColor" }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
    {children}
  </svg>
);
const SearchIcon = (p) => <Icon {...p}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></Icon>;
const PlusIcon = (p) => <Icon {...p}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></Icon>;
const XIcon = (p) => <Icon {...p}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></Icon>;
const LinkIcon = (p) => <Icon {...p}><path d="M9 17H7A5 5 0 0 1 7 7h2"/><path d="M15 7h2a5 5 0 1 1 0 10h-2"/><line x1="8" y1="12" x2="16" y2="12"/></Icon>;
const TrashIcon = (p) => <Icon {...p}><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></Icon>;
const ChevronIcon = (p) => <Icon {...p}><polyline points="9 18 15 12 9 6"/></Icon>;

function Palimpsest() {
  const [nodes, setNodes] = useState([]);
  const [edges, setEdges] = useState([]);
  const [loaded, setLoaded] = useState(false);

  const [positions, setPositions] = useState({});
  const [dimensions, setDimensions] = useState({ width: 900, height: 600 });
  const containerRef = useRef(null);

  const [selectedId, setSelectedId] = useState(null);
  const [query, setQuery] = useState("");
  const [showAdd, setShowAdd] = useState(false);
  const [linking, setLinking] = useState(false);
  const [linkQuery, setLinkQuery] = useState("");
  const [form, setForm] = useState({ title: "", body: "", tags: "" });

  useEffect(() => {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const data = JSON.parse(raw);
        setNodes(data.nodes || []);
        setEdges(data.edges || []);
      }
    } catch (e) {}
    setLoaded(true);
  }, []);

  useEffect(() => {
    if (!loaded) return;
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ nodes, edges }));
    } catch (e) {}
  }, [nodes, edges, loaded]);

  useEffect(() => {
    const el = containerRef.current;
    if (!el) return;
    const ro = new ResizeObserver((entries) => {
      const { width, height } = entries[0].contentRect;
      setDimensions({ width, height });
    });
    ro.observe(el);
    return () => ro.disconnect();
  }, []);

  const nodesById = useMemo(() => Object.fromEntries(nodes.map((n) => [n.id, n])), [nodes]);

  useEffect(() => {
    if (!loaded) return;
    const { width, height } = dimensions;
    if (!width || !height) return;

    const simNodes = nodes.map((n) => ({
      id: n.id, tags: n.tags, status: n.status,
      x: positions[n.id]?.x ?? width / 2 + (Math.random() - 0.5) * 120,
      y: positions[n.id]?.y ?? height / 2 + (Math.random() - 0.5) * 120,
    }));
    const simEdges = edges.map((e) => ({ ...e }));
    const anchor = (d) => {
      if (!d.tags || d.tags.length === 0) return { x: width / 2, y: height / 2 };
      const pts = d.tags.map((t) => tagAnchor(t, width, height));
      return { x: d3.mean(pts, (p) => p.x), y: d3.mean(pts, (p) => p.y) };
    };

    const sim = d3.forceSimulation(simNodes)
      .force("charge", d3.forceManyBody().strength(-220))
      .force("collide", d3.forceCollide((d) => (d.status === "superseded" ? 20 : 30)))
      .force("link", d3.forceLink(simEdges).id((d) => d.id).distance(100).strength(0.22))
      .force("x", d3.forceX((d) => anchor(d).x).strength(0.06))
      .force("y", d3.forceY((d) => anchor(d).y).strength(0.06))
      .on("tick", () => {
        const pos = {};
        simNodes.forEach((n) => (pos[n.id] = { x: n.x, y: n.y }));
        setPositions(pos);
      });
    return () => sim.stop();
  }, [nodes, edges, loaded, dimensions.width, dimensions.height]);

  const matchedIds = useMemo(() => {
    if (!query.trim()) return null;
    const q = query.toLowerCase();
    return new Set(nodes.filter((n) =>
      n.title.toLowerCase().includes(q) || n.body.toLowerCase().includes(q) || n.tags.some((t) => t.toLowerCase().includes(q))
    ).map((n) => n.id));
  }, [query, nodes]);

  const selected = selectedId ? nodesById[selectedId] : null;
  const connectedEdges = useMemo(() => {
    if (!selected) return [];
    return edges.filter((e) => e.source === selected.id || e.target === selected.id);
  }, [edges, selected]);

  function addNode() {
    if (!form.title.trim()) return;
    const node = {
      id: uid(), title: form.title.trim(), body: form.body.trim(),
      tags: form.tags.split(",").map((t) => t.trim()).filter(Boolean),
      status: "active", supersededBy: null, createdAt: Date.now(),
    };
    setNodes((ns) => [...ns, node]);
    setForm({ title: "", body: "", tags: "" });
    setShowAdd(false);
    setSelectedId(node.id);
  }

  function deleteNode(id) {
    setNodes((ns) => ns.filter((n) => n.id !== id).map((n) => (n.supersededBy === id ? { ...n, supersededBy: null, status: "active" } : n)));
    setEdges((es) => es.filter((e) => e.source !== id && e.target !== id));
    if (selectedId === id) setSelectedId(null);
  }

  function addLink(targetId, type) {
    if (!selected) return;
    const edge = { id: uid(), source: selected.id, target: targetId, type };
    setEdges((es) => [...es, edge]);
    if (type === "supersedes") {
      setNodes((ns) => ns.map((n) => (n.id === targetId ? { ...n, status: "superseded", supersededBy: selected.id } : n)));
    }
    setLinking(false);
    setLinkQuery("");
  }

  const linkCandidates = useMemo(() => {
    if (!selected) return [];
    const q = linkQuery.toLowerCase();
    return nodes.filter((n) => n.id !== selected.id && (q === "" || n.title.toLowerCase().includes(q))).slice(0, 8);
  }, [nodes, selected, linkQuery]);

  const edgeColor = (type) => (type === "support" ? COLORS.support : type === "contradict" ? COLORS.contradict : COLORS.supersede);
  const sans = { fontFamily: "system-ui, sans-serif" };

  return (
    <div style={{ width: "100%", height: "100vh", display: "flex", flexDirection: "column", overflow: "hidden", background: COLORS.bg, color: COLORS.text }}>
      <div style={{ display: "flex", alignItems: "center", gap: 12, padding: "12px 20px", borderBottom: `1px solid ${COLORS.panelBorder}`, flexShrink: 0 }}>
        <div style={{ display: "flex", flexDirection: "column", lineHeight: 1.2, marginRight: 8 }}>
          <span style={{ fontSize: 18, fontWeight: 500, letterSpacing: 0.3 }}>Palimpsest</span>
          <span style={{ fontSize: 12, color: COLORS.textFaint, ...sans }}>{nodes.length} thought{nodes.length === 1 ? "" : "s"}</span>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 8, padding: "6px 12px", borderRadius: 999, flex: 1, maxWidth: 360, background: COLORS.panel, border: `1px solid ${COLORS.panelBorder}` }}>
          <SearchIcon size={14} color={COLORS.textFaint} />
          <input value={query} onChange={(e) => setQuery(e.target.value)} placeholder="Search your thoughts…"
            style={{ background: "transparent", outline: "none", border: "none", fontSize: 14, flex: 1, color: COLORS.text, ...sans }} />
        </div>
        <button onClick={() => setShowAdd(true)} style={{ display: "flex", alignItems: "center", gap: 6, padding: "6px 14px", borderRadius: 999, fontSize: 14, marginLeft: "auto", background: COLORS.text, color: COLORS.bg, border: "none", fontWeight: 500, ...sans }}>
          <PlusIcon size={14} /> New thought
        </button>
      </div>

      <div style={{ flex: 1, position: "relative", overflow: "hidden" }} ref={containerRef}>
        {!loaded ? (
          <div style={{ width: "100%", height: "100%", display: "flex", alignItems: "center", justifyContent: "center", color: COLORS.textFaint }}>Loading…</div>
        ) : nodes.length === 0 ? (
          <div style={{ width: "100%", height: "100%", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 12 }}>
            <p style={{ color: COLORS.textMuted }}>Nothing here yet.</p>
            <button onClick={() => setShowAdd(true)} style={{ padding: "8px 16px", borderRadius: 999, fontSize: 14, background: COLORS.panel, border: `1px solid ${COLORS.panelBorder}`, color: COLORS.text, ...sans }}>
              Add your first thought
            </button>
          </div>
        ) : (
          <svg width={dimensions.width} height={dimensions.height}>
            <g>
              {edges.map((e) => {
                const s = positions[e.source], t = positions[e.target];
                if (!s || !t) return null;
                const dimmed = matchedIds && !(matchedIds.has(e.source) || matchedIds.has(e.target));
                return <line key={e.id} x1={s.x} y1={s.y} x2={t.x} y2={t.y} stroke={edgeColor(e.type)}
                  strokeWidth={e.type === "supersedes" ? 1.25 : 1.5}
                  strokeDasharray={e.type === "contradict" ? "3 4" : e.type === "supersedes" ? "1 3" : "none"}
                  opacity={dimmed ? 0.08 : e.type === "supersedes" ? 0.35 : 0.55} />;
              })}
            </g>
            <g>
              {nodes.map((n) => {
                const p = positions[n.id];
                if (!p) return null;
                const isSuperseded = n.status === "superseded";
                const isSelected = selectedId === n.id;
                const dimmed = matchedIds && !matchedIds.has(n.id);
                const r = isSuperseded ? 5 : isSelected ? 9 : 7;
                return (
                  <g key={n.id} transform={`translate(${p.x},${p.y})`} onClick={() => setSelectedId(n.id)}
                    style={{ cursor: "pointer" }} opacity={dimmed ? 0.15 : isSuperseded ? 0.45 : 1}>
                    <circle r={r} fill={isSuperseded ? COLORS.supersede : isSelected ? COLORS.support : COLORS.text}
                      stroke={isSelected ? COLORS.support : "none"} strokeWidth={2} />
                    <text x={r + 6} y={4} fontSize={12} fill={isSuperseded ? COLORS.textFaint : COLORS.textMuted}
                      style={{ ...sans, pointerEvents: "none" }}>
                      {n.title.length > 34 ? n.title.slice(0, 34) + "…" : n.title}
                    </text>
                  </g>
                );
              })}
            </g>
          </svg>
        )}

        {nodes.length > 0 && (
          <div style={{ position: "absolute", bottom: 16, left: 16, display: "flex", gap: 16, padding: "8px 12px", borderRadius: 8, fontSize: 12, background: COLORS.panel, border: `1px solid ${COLORS.panelBorder}`, color: COLORS.textMuted, ...sans }}>
            <span style={{ display: "flex", alignItems: "center", gap: 6 }}><span style={{ width: 10, height: 2, background: COLORS.support, display: "inline-block" }} /> supports</span>
            <span style={{ display: "flex", alignItems: "center", gap: 6 }}><span style={{ width: 10, height: 2, background: COLORS.contradict, display: "inline-block" }} /> contradicts</span>
            <span style={{ display: "flex", alignItems: "center", gap: 6 }}><span style={{ width: 10, height: 2, background: COLORS.supersede, display: "inline-block" }} /> supersedes</span>
          </div>
        )}

        <div style={{ position: "absolute", bottom: 16, right: 16, fontSize: 12, color: COLORS.textFaint, ...sans }}>Jinnie × Claude</div>

        {selected && (
          <div style={{ position: "absolute", top: 0, right: 0, height: "100%", width: 340, display: "flex", flexDirection: "column", background: COLORS.panel, borderLeft: `1px solid ${COLORS.panelBorder}` }}>
            <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", padding: 16, borderBottom: `1px solid ${COLORS.panelBorder}` }}>
              <div>
                <div style={{ fontSize: 12, marginBottom: 4, color: COLORS.textFaint, ...sans }}>
                  {formatDate(selected.createdAt)}{selected.status === "superseded" && " · superseded"}
                </div>
                <div style={{ fontSize: 16, lineHeight: 1.3 }}>{selected.title}</div>
              </div>
              <button onClick={() => setSelectedId(null)} style={{ background: "none", border: "none" }}><XIcon size={16} color={COLORS.textFaint} /></button>
            </div>

            <div style={{ padding: 16, flex: 1, overflowY: "auto" }}>
              {selected.body && <p style={{ fontSize: 14, lineHeight: 1.6, marginBottom: 16, color: COLORS.textMuted }}>{selected.body}</p>}

              {selected.tags.length > 0 && (
                <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 16 }}>
                  {selected.tags.map((t) => <span key={t} style={{ fontSize: 12, padding: "2px 8px", borderRadius: 999, border: `1px solid ${COLORS.panelBorder}`, color: COLORS.textMuted, ...sans }}>{t}</span>)}
                </div>
              )}

              {connectedEdges.length > 0 && (
                <div style={{ marginBottom: 16 }}>
                  <div style={{ fontSize: 12, marginBottom: 8, color: COLORS.textFaint, ...sans }}>Connections</div>
                  <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                    {connectedEdges.map((e) => {
                      const otherId = e.source === selected.id ? e.target : e.source;
                      const other = nodesById[otherId];
                      if (!other) return null;
                      const verb = e.type === "supersedes" ? (e.source === selected.id ? "supersedes" : "superseded by") : e.type;
                      return (
                        <button key={e.id} onClick={() => setSelectedId(other.id)} style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 12, textAlign: "left", padding: "6px 8px", borderRadius: 6, background: COLORS.bg, border: "none", color: COLORS.text, ...sans }}>
                          <span style={{ color: edgeColor(e.type), whiteSpace: "nowrap" }}>{verb}</span>
                          <span style={{ color: COLORS.textMuted, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{other.title}</span>
                          <ChevronIcon size={12} color={COLORS.textFaint} />
                        </button>
                      );
                    })}
                  </div>
                </div>
              )}

              {linking ? (
                <div style={{ marginBottom: 16 }}>
                  <input autoFocus value={linkQuery} onChange={(e) => setLinkQuery(e.target.value)} placeholder="Find a thought…"
                    style={{ width: "100%", fontSize: 14, padding: "6px 10px", borderRadius: 6, marginBottom: 8, background: COLORS.bg, border: `1px solid ${COLORS.panelBorder}`, color: COLORS.text, outline: "none", ...sans }} />
                  <div style={{ display: "flex", flexDirection: "column", gap: 4, maxHeight: 160, overflowY: "auto" }}>
                    {linkCandidates.map((c) => (
                      <div key={c.id} style={{ padding: "6px 8px", borderRadius: 6, background: COLORS.bg }}>
                        <div style={{ fontSize: 12, marginBottom: 6, color: COLORS.textMuted, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", ...sans }}>{c.title}</div>
                        <div style={{ display: "flex", gap: 4 }}>
                          <button onClick={() => addLink(c.id, "support")} style={{ fontSize: 12, padding: "2px 8px", borderRadius: 999, background: "transparent", color: COLORS.support, border: `1px solid ${COLORS.support}`, ...sans }}>supports</button>
                          <button onClick={() => addLink(c.id, "contradict")} style={{ fontSize: 12, padding: "2px 8px", borderRadius: 999, background: "transparent", color: COLORS.contradict, border: `1px solid ${COLORS.contradict}`, ...sans }}>contradicts</button>
                          <button onClick={() => addLink(c.id, "supersedes")} style={{ fontSize: 12, padding: "2px 8px", borderRadius: 999, background: "transparent", color: COLORS.supersede, border: `1px solid ${COLORS.supersede}`, ...sans }}>supersedes</button>
                        </div>
                      </div>
                    ))}
                  </div>
                  <button onClick={() => setLinking(false)} style={{ fontSize: 12, marginTop: 8, background: "none", border: "none", color: COLORS.textFaint, ...sans }}>Cancel</button>
                </div>
              ) : (
                <button onClick={() => setLinking(true)} style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 12, marginBottom: 16, background: "none", border: "none", color: COLORS.textMuted, ...sans }}>
                  <LinkIcon size={13} /> Link to another thought
                </button>
              )}
            </div>

            <div style={{ padding: 16, borderTop: `1px solid ${COLORS.panelBorder}` }}>
              <button onClick={() => deleteNode(selected.id)} style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 12, background: "none", border: "none", color: COLORS.textFaint, ...sans }}>
                <TrashIcon size={13} /> Delete
              </button>
            </div>
          </div>
        )}

        {showAdd && (
          <div style={{ position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center", background: "rgba(0,0,0,0.5)" }} onClick={() => setShowAdd(false)}>
            <div style={{ width: 380, padding: 20, borderRadius: 12, display: "flex", flexDirection: "column", gap: 12, background: COLORS.panel, border: `1px solid ${COLORS.panelBorder}` }} onClick={(e) => e.stopPropagation()}>
              <div style={{ fontSize: 14, color: COLORS.textMuted, ...sans }}>New thought</div>
              <input autoFocus value={form.title} onChange={(e) => setForm((f) => ({ ...f, title: e.target.value }))} placeholder="One line — what's the view?"
                style={{ fontSize: 14, padding: "8px 12px", borderRadius: 6, background: COLORS.bg, border: `1px solid ${COLORS.panelBorder}`, color: COLORS.text, outline: "none", ...sans }} />
              <textarea value={form.body} onChange={(e) => setForm((f) => ({ ...f, body: e.target.value }))} placeholder="Say more, and what prompted it, if you want." rows={4}
                style={{ fontSize: 14, padding: "8px 12px", borderRadius: 6, resize: "none", background: COLORS.bg, border: `1px solid ${COLORS.panelBorder}`, color: COLORS.text, outline: "none", ...sans }} />
              <input value={form.tags} onChange={(e) => setForm((f) => ({ ...f, tags: e.target.value }))} placeholder="Tags, comma separated"
                style={{ fontSize: 14, padding: "8px 12px", borderRadius: 6, background: COLORS.bg, border: `1px solid ${COLORS.panelBorder}`, color: COLORS.text, outline: "none", ...sans }} />
              <div style={{ display: "flex", justifyContent: "flex-end", gap: 8, marginTop: 4 }}>
                <button onClick={() => setShowAdd(false)} style={{ fontSize: 12, padding: "6px 12px", background: "none", border: "none", color: COLORS.textFaint, ...sans }}>Cancel</button>
                <button onClick={addNode} style={{ fontSize: 12, padding: "6px 12px", borderRadius: 999, background: COLORS.text, color: COLORS.bg, border: "none", fontWeight: 500, ...sans }}>Add</button>
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Palimpsest />);
</script>
</body>
</html>
